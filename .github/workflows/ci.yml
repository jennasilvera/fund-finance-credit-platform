name: Fund Finance Credit Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fundfinance
          POSTGRES_PASSWORD: fundfinance
          POSTGRES_DB: fundfinance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fundfinance -d fundfinance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://fundfinance:fundfinance@localhost:5432/fundfinance
      POSTGRES_USER: fundfinance
      POSTGRES_PASSWORD: fundfinance
      POSTGRES_DB: fundfinance
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check src tests

      - name: Run tests
        run: |
          pytest
